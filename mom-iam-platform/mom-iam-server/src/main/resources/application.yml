server:
  port: ${SERVER_PORT:20100}
  servlet:
    session:
      cookie:
        name: MOM_IAM_SESSION
        http-only: true
        secure: ${IAM_COOKIE_SECURE:false}
        same-site: lax

spring:
  application:
    name: mom-iam-server
  datasource:
    url: ${POSTGRES_URL:jdbc:postgresql://${POSTGRES_HOST:127.0.0.1}:${POSTGRES_PORT:5432}/${POSTGRES_DATABASE:mom_platform}?currentSchema=${POSTGRES_SCHEMA:mom_iam}&tcpKeepAlive=${POSTGRES_TCP_KEEP_ALIVE:true}&ApplicationName=${POSTGRES_APPLICATION_NAME:mom-iam-server}}
    username: ${POSTGRES_USERNAME:mom}
    password: ${POSTGRES_PASSWORD:mom}
    hikari:
      pool-name: ${POSTGRES_POOL_NAME:mom-iam-hikari}
      minimum-idle: ${POSTGRES_MINIMUM_IDLE:1}
      maximum-pool-size: ${POSTGRES_MAXIMUM_POOL_SIZE:5}
      connection-timeout: ${POSTGRES_CONNECTION_TIMEOUT:3000}
      validation-timeout: ${POSTGRES_VALIDATION_TIMEOUT:2000}
      leak-detection-threshold: ${POSTGRES_LEAK_DETECTION_THRESHOLD:0}
      connection-init-sql: SET TIME ZONE 'UTC'
  data:
    redis:
      host: ${REDIS_HOST:127.0.0.1}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      database: ${REDIS_DATABASE:0}
      connect-timeout: ${REDIS_CONNECT_TIMEOUT:2s}
      timeout: ${REDIS_COMMAND_TIMEOUT:2s}
  flyway:
    enabled: ${FLYWAY_ENABLED:true}
    create-schemas: true
    default-schema: ${POSTGRES_SCHEMA:mom_iam}
    schemas: ${POSTGRES_SCHEMA:mom_iam}
    locations: classpath:db/migration/iam
    validate-migration-naming: true
    clean-disabled: true
    baseline-on-migrate: false
  cloud:
    nacos:
      discovery:
        enabled: ${NACOS_DISCOVERY_ENABLED:false}
        server-addr: ${NACOS_SERVER_ADDR:127.0.0.1:8848}
        username: ${NACOS_USERNAME:nacos}
        password: ${NACOS_PASSWORD:nacos}
        namespace: ${NACOS_NAMESPACE:}
        group: ${NACOS_GROUP:DEFAULT_GROUP}
        cluster-name: ${NACOS_CLUSTER_NAME:DEFAULT}

mom:
  iam:
    admin:
      enabled: ${IAM_ADMIN_ENABLED:true}
    authorization:
      enabled: ${IAM_AUTHORIZATION_ENABLED:true}
      issuer: ${IAM_ISSUER:http://127.0.0.1:20100}
      security:
        max-failed-attempts: ${IAM_MAX_FAILED_ATTEMPTS:5}
        lock-duration: ${IAM_LOCK_DURATION:15m}
        minimum-password-length: ${IAM_MINIMUM_PASSWORD_LENGTH:12}
      key:
        key-id: ${IAM_JWK_KEY_ID:mom-iam-local-2026}
        private-key-location: ${IAM_JWK_PRIVATE_KEY:classpath:keys/test/mom-iam-private.pem}
        public-key-location: ${IAM_JWK_PUBLIC_KEY:classpath:keys/test/mom-iam-public.pem}
        allow-test-key: ${IAM_ALLOW_TEST_KEY:true}
      admin-web:
        redirect-uri: ${MOM_ADMIN_WEB_REDIRECT_URI:http://127.0.0.1:5173/auth/callback}
        post-logout-redirect-uri: ${MOM_ADMIN_WEB_POST_LOGOUT_REDIRECT_URI:http://127.0.0.1:5173/}
      supplier-web:
        redirect-uri: ${MOM_SUPPLIER_WEB_REDIRECT_URI:http://127.0.0.1:5174/auth/callback}
        post-logout-redirect-uri: ${MOM_SUPPLIER_WEB_POST_LOGOUT_REDIRECT_URI:http://127.0.0.1:5174/}
      customer-web:
        redirect-uri: ${MOM_CUSTOMER_WEB_REDIRECT_URI:http://127.0.0.1:5175/auth/callback}
        post-logout-redirect-uri: ${MOM_CUSTOMER_WEB_POST_LOGOUT_REDIRECT_URI:http://127.0.0.1:5175/}
      mobile-pda:
        redirect-uri: ${MOM_MOBILE_PDA_REDIRECT_URI:com.mom.mobile:/oauth2/callback}
        post-logout-redirect-uri: ${MOM_MOBILE_PDA_POST_LOGOUT_REDIRECT_URI:com.mom.mobile:/logout/callback}
    session:
      web-absolute-ttl: ${IAM_WEB_SESSION_TTL:8h}
      mobile-absolute-ttl: ${IAM_MOBILE_SESSION_TTL:12h}
      access-token-ttl: ${IAM_ACCESS_TOKEN_TTL:10m}
      refresh-token-bytes: ${IAM_REFRESH_TOKEN_BYTES:48}
      hmac-pepper: ${IAM_REFRESH_HMAC_PEPPER:mom-iam-local-refresh-pepper-change-me}
      revoked-key-prefix: ${IAM_REVOKED_SID_PREFIX:mom:iam:revoked:sid:}
      allow-local-pepper: ${IAM_ALLOW_LOCAL_REFRESH_PEPPER:true}

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
  global-config:
    banner: false

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      probes:
        enabled: true
  tracing:
    sampling:
      probability: ${TRACING_SAMPLING_PROBABILITY:0.1}

logging:
  pattern:
    correlation: "[trace_id=%X{traceId:-} span_id=%X{spanId:-}] "
