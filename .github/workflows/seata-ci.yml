name: Seata CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: seata-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  seata-at:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "25"
          cache: maven

      - name: Package MDM and Integration applications
        shell: bash
        run: |
          set -o pipefail
          mvn -B -ntp -DskipTests \
            -pl :mom-mdm-server,:mom-integration-server \
            -am package 2>&1 | tee seata-build.log

      - name: Run controlled Seata AT smoke test
        shell: bash
        run: bash .github/scripts/p01-s06-seata-at-smoke.sh

      - name: Upload Seata diagnostics on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: seata-verification-diagnostics
          path: |
            seata-build.log
            p01-s06-mdm-postgresql.log
            p01-s06-integration-postgresql.log
            p01-s06-seata-server.log
            p01-s06-mdm-migration.log
            p01-s06-integration-migration.log
            p01-s06-mdm-migration-health.json
            p01-s06-integration-migration-health.json
            p01-s06-mdm-server.log
            p01-s06-integration-server.log
            p01-s06-mdm-health.json
            p01-s06-integration-health.json
            p01-s06-success-response.json
            p01-s06-global-rollback-response.json
            p01-s06-participant-failure-response.json
            p01-s06-tc-outage-response.json
            p01-s06-status.txt
            **/target/surefire-reports/**
          if-no-files-found: ignore
