name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "25"
          cache: maven

      - name: Clean verify reactor and architecture boundaries
        shell: bash
        run: |
          set -o pipefail
          mvn -B -ntp clean verify 2>&1 | tee maven-build.log

      - name: Upload verification diagnostics on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: verification-diagnostics
          path: |
            maven-build.log
            **/target/surefire-reports/**
            **/target/failsafe-reports/**
          if-no-files-found: ignore
