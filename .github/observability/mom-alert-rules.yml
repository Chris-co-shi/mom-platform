groups:
  - name: mom-platform-availability
    interval: 5s
    rules:
      - alert: MOMServiceDown
        expr: up{job=~"mom-gateway|mom-integration-server|mom-mdm-server"} == 0
        for: 10s
        labels:
          severity: critical
          category: availability
        annotations:
          summary: "MOM service is unavailable"
          description: "{{ $labels.job }} has not been scraped successfully for more than 10 seconds."

      - alert: MOMHighHttp5xxRate
        expr: |
          sum by (job) (rate(http_server_requests_seconds_count{status=~"5.."}[2m]))
          /
          clamp_min(sum by (job) (rate(http_server_requests_seconds_count[2m])), 0.001)
          > 0.05
        for: 5m
        labels:
          severity: warning
          category: http
        annotations:
          summary: "MOM HTTP 5xx rate is high"
          description: "{{ $labels.job }} has exceeded a 5% HTTP 5xx rate for five minutes."

      - alert: MOMHikariPoolExhausted
        expr: hikaricp_connections_active >= hikaricp_connections_max
        for: 30s
        labels:
          severity: critical
          category: database
        annotations:
          summary: "MOM Hikari pool is exhausted"
          description: "{{ $labels.pool }} has no spare database connections."

  - name: mom-platform-application-metrics
    interval: 15s
    rules:
      - alert: MOMGatewayRateLimitUnavailable
        expr: increase(mom_gateway_rate_limit_requests_total{outcome="unavailable"}[5m]) > 0
        for: 0m
        labels:
          severity: critical
          category: gateway
        annotations:
          summary: "Gateway Redis rate limiting is unavailable"
          description: "{{ $labels.application }} route {{ $labels.route }} reported a fail-closed Redis rate-limit failure."

      - alert: MOMOutboxDeadEvents
        expr: increase(mom_outbox_publish_results_total{outcome="dead"}[10m]) > 0
        for: 0m
        labels:
          severity: critical
          category: messaging
        annotations:
          summary: "Outbox event entered DEAD state"
          description: "{{ $labels.application }} recorded an Outbox event that exhausted automatic retries."

      - alert: MOMInboxProcessingFailures
        expr: increase(mom_inbox_process_results_total{outcome="failed"}[5m]) > 0
        for: 1m
        labels:
          severity: warning
          category: messaging
        annotations:
          summary: "Inbox consumer processing is failing"
          description: "{{ $labels.application }} consumer {{ $labels.consumer }} recorded a transactional processing failure."
