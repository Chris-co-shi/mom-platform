groups:
  - name: mom-platform-availability
    interval: 5s
    rules:
      - alert: MOMServiceDown
        expr: up{job=~"mom-gateway|mom-integration-server|mom-mdm-server"} == 0
        for: 10s
        labels:
          severity: critical
          category: availability
        annotations:
          summary: "MOM service is unavailable"
          description: "{{ $labels.job }} has not been scraped successfully for more than 10 seconds."

      - alert: MOMHighHttp5xxRate
        expr: |
          sum by (job) (rate(http_server_requests_seconds_count{status=~"5.."}[2m]))
          /
          clamp_min(sum by (job) (rate(http_server_requests_seconds_count[2m])), 0.001)
          > 0.05
        for: 5m
        labels:
          severity: warning
          category: http
        annotations:
          summary: "MOM HTTP 5xx rate is high"
          description: "{{ $labels.job }} has exceeded a 5% HTTP 5xx rate for five minutes."

      - alert: MOMHikariPoolExhausted
        expr: hikaricp_connections_active >= hikaricp_connections_max
        for: 30s
        labels:
          severity: critical
          category: database
        annotations:
          summary: "MOM Hikari pool is exhausted"
          description: "{{ $labels.pool }} has no spare database connections."
