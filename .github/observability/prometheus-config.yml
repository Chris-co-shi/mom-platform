global:
  scrape_interval: 2s
  scrape_timeout: 1s
  evaluation_interval: 2s

rule_files:
  - /etc/prometheus/mom-alert-rules.yml

scrape_configs:
  - job_name: mom-gateway
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: [host.docker.internal:20030]

  - job_name: mom-mdm-server
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: [host.docker.internal:20230]

  - job_name: mom-integration-server
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: [host.docker.internal:20830]

  - job_name: prometheus
    static_configs:
      - targets: [localhost:9090]
