global:
  scrape_interval: 5s
  evaluation_interval: 5s

rule_files:
  - /etc/prometheus/mom-alert-rules.yml

scrape_configs:
  - job_name: mom-gateway
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: [host.docker.internal:20030]
        labels:
          service: mom-gateway
          environment: ci

  - job_name: mom-integration-server
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: [host.docker.internal:20830]
        labels:
          service: mom-integration-server
          environment: ci

  - job_name: mom-mdm-server
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: [host.docker.internal:20230]
        labels:
          service: mom-mdm-server
          environment: ci
