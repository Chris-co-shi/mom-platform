server:
  port: ${SERVER_PORT:20000}

spring:
  application:
    name: mom-gateway
  data:
    redis:
      host: ${REDIS_HOST:127.0.0.1}
      port: ${REDIS_PORT:6379}
      database: ${REDIS_DATABASE:0}
      username: ${REDIS_USERNAME:}
      password: ${REDIS_PASSWORD:}
      connect-timeout: ${REDIS_CONNECT_TIMEOUT:2s}
      timeout: ${REDIS_TIMEOUT:2s}
  cloud:
    nacos:
      discovery:
        enabled: ${NACOS_DISCOVERY_ENABLED:false}
        server-addr: ${NACOS_SERVER_ADDR:127.0.0.1:8848}
        username: ${NACOS_USERNAME:nacos}
        password: ${NACOS_PASSWORD:nacos}
        namespace: ${NACOS_NAMESPACE:}
        group: ${NACOS_GROUP:DEFAULT_GROUP}
        cluster-name: ${NACOS_CLUSTER_NAME:DEFAULT}
    gateway:
      server:
        webflux:
          observability:
            enabled: true
          routes:
            - id: integration-service
              uri: lb://mom-integration-server
              predicates:
                - Path=/api/integration/**
              filters:
                - StripPrefix=1
                - name: RequestRateLimiter
                  args:
                    rate-limiter: "#{@momFailClosedRedisRateLimiter}"
                    key-resolver: "#{@requestIdentityKeyResolver}"
                    redis-rate-limiter.replenishRate: ${GATEWAY_RATE_LIMIT_REPLENISH_RATE:10}
                    redis-rate-limiter.burstCapacity: ${GATEWAY_RATE_LIMIT_BURST_CAPACITY:20}
                    redis-rate-limiter.requestedTokens: ${GATEWAY_RATE_LIMIT_REQUESTED_TOKENS:1}

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,nacos-discovery
  endpoint:
    health:
      probes:
        enabled: true
  tracing:
    sampling:
      probability: ${TRACING_SAMPLING_PROBABILITY:0.1}
    propagation:
      type: w3c
    export:
      otlp:
        enabled: ${OTEL_TRACING_EXPORT_ENABLED:false}
  opentelemetry:
    resource-attributes:
      service.namespace: mom-platform
      deployment.environment.name: ${MOM_ENVIRONMENT:local}
    tracing:
      export:
        otlp:
          endpoint: ${OTEL_EXPORTER_OTLP_TRACES_ENDPOINT:http://127.0.0.1:4318/v1/traces}
          timeout: ${OTEL_EXPORTER_OTLP_TRACES_TIMEOUT:2s}

logging:
  pattern:
    correlation: "[trace_id=%X{traceId:-} span_id=%X{spanId:-}] "
