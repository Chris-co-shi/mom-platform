server:
  port: ${SERVER_PORT:20200}

spring:
  application:
    name: mom-mdm-server
  datasource:
    url: ${POSTGRES_URL:jdbc:postgresql://${POSTGRES_HOST:127.0.0.1}:${POSTGRES_PORT:5432}/${POSTGRES_DATABASE:mom_platform}?currentSchema=${POSTGRES_SCHEMA:mom_mdm}&tcpKeepAlive=${POSTGRES_TCP_KEEP_ALIVE:true}&ApplicationName=${POSTGRES_APPLICATION_NAME:mom-mdm-server}}
    username: ${POSTGRES_USERNAME:mom}
    password: ${POSTGRES_PASSWORD:mom}
    hikari:
      pool-name: ${POSTGRES_POOL_NAME:mom-mdm-hikari}
      minimum-idle: ${POSTGRES_MINIMUM_IDLE:1}
      maximum-pool-size: ${POSTGRES_MAXIMUM_POOL_SIZE:5}
      connection-timeout: ${POSTGRES_CONNECTION_TIMEOUT:3000}
      validation-timeout: ${POSTGRES_VALIDATION_TIMEOUT:2000}
      leak-detection-threshold: ${POSTGRES_LEAK_DETECTION_THRESHOLD:0}
      connection-init-sql: SET TIME ZONE 'UTC'
  flyway:
    enabled: ${FLYWAY_ENABLED:true}
    create-schemas: true
    default-schema: ${POSTGRES_SCHEMA:mom_mdm}
    schemas: ${POSTGRES_SCHEMA:mom_mdm}
    locations: classpath:db/migration/mdm
    validate-migration-naming: true
    clean-disabled: true
    baseline-on-migrate: false
  cloud:
    nacos:
      discovery:
        enabled: ${NACOS_DISCOVERY_ENABLED:false}
        server-addr: ${NACOS_SERVER_ADDR:127.0.0.1:8848}
        username: ${NACOS_USERNAME:nacos}
        password: ${NACOS_PASSWORD:nacos}
        namespace: ${NACOS_NAMESPACE:}
        group: ${NACOS_GROUP:DEFAULT_GROUP}
        cluster-name: ${NACOS_CLUSTER_NAME:DEFAULT}
    openfeign:
      client:
        config:
          integrationSeataAtParticipantClient:
            connect-timeout: ${INTEGRATION_SEATA_CLIENT_CONNECT_TIMEOUT:2000}
            read-timeout: ${INTEGRATION_SEATA_CLIENT_READ_TIMEOUT:5000}
            logger-level: basic
    stream:
      bindings:
        momDomainEvents-out-0:
          destination: ${MOM_DOMAIN_EVENT_TOPIC:mom-domain-events-v1}
          content-type: application/json
      rocketmq:
        binder:
          name-server: ${ROCKETMQ_NAME_SERVER:127.0.0.1:9876}
          enable-msg-trace: ${ROCKETMQ_ENABLE_MSG_TRACE:false}
        bindings:
          momDomainEvents-out-0:
            producer:
              group: ${ROCKETMQ_PRODUCER_GROUP:mom-mdm-outbox-v1}
              send-type: Sync
              send-msg-timeout: ${ROCKETMQ_SEND_TIMEOUT:3000}
              retry-times-when-send-failed: 0

seata:
  enabled: ${SEATA_ENABLED:false}
  application-id: ${spring.application.name}
  tx-service-group: mom-p01-s06-tx-group
  enable-auto-data-source-proxy: true
  data-source-proxy-mode: AT
  use-jdk-proxy: false
  registry:
    type: file
  config:
    type: file
  service:
    vgroup-mapping:
      mom-p01-s06-tx-group: default
    grouplist:
      default: ${SEATA_SERVER_ADDR:127.0.0.1:8091}
  client:
    rm:
      report-success-enable: true
      table-meta-check-enable: true

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
  global-config:
    banner: false

mom:
  mdm:
    data-probe:
      enabled: ${MDM_DATA_PROBE_ENABLED:false}
    outbox-probe:
      enabled: ${MDM_OUTBOX_PROBE_ENABLED:false}
    seata-at-probe:
      enabled: ${MDM_SEATA_AT_PROBE_ENABLED:false}
  outbox:
    publisher:
      enabled: ${OUTBOX_PUBLISHER_ENABLED:false}
      binding-name: momDomainEvents-out-0
      fixed-delay-millis: ${OUTBOX_FIXED_DELAY_MILLIS:1000}
      batch-size: ${OUTBOX_BATCH_SIZE:20}
      lease-duration: ${OUTBOX_LEASE_DURATION:30s}
      max-attempts: ${OUTBOX_MAX_ATTEMPTS:8}
      initial-backoff: ${OUTBOX_INITIAL_BACKOFF:1s}
      max-backoff: ${OUTBOX_MAX_BACKOFF:5m}

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,nacos-discovery,bindings
  endpoint:
    health:
      probes:
        enabled: true
